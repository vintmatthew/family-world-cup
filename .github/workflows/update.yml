name: Update World Cup tracker

# Rebuilds the page from the latest data and republishes it to GitHub Pages.
# Runs automatically every hour, and can be triggered by hand from the Actions
# tab (the "Run workflow" button). No laptop required — this runs on GitHub.

on:
  # PRIMARY updater is an external trigger (cron-job.org) that hits
  # workflow_dispatch every 5 minutes — far more reliable than GitHub's own cron,
  # which silently drops most scheduled runs. The schedule below is just a sparse
  # BACKUP for if that external service is ever down.
  schedule:
    - cron: "13,43 * * * *" # backup only: twice an hour
  workflow_dispatch: {} # used by the external trigger AND the manual "Run workflow" button
  push:
    branches: [main] # rebuild straight away whenever you push a change

permissions:
  contents: read
  pages: write
  id-token: write

# Only ever publish the latest build. If a new run starts while an older one is
# still going, cancel the older one — this prevents two builds clashing at the
# publish step (which otherwise sends a spurious "run failed" email even though
# the next run recovers). For a simple "always show newest" page this is ideal.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build the page
        run: node refresh.mjs
        # Note: PDF generation is skipped here (no browser on the runner) — the
        # script handles that gracefully. The live web page is what gets published.

      - name: Stage the page for publishing
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
