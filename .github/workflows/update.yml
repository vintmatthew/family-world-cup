name: Update World Cup tracker

# Rebuilds the page from the latest data and republishes it to GitHub Pages.
# Triggered every ~5 min by an external cron (cron-job.org) hitting
# workflow_dispatch, with a sparse GitHub schedule as backup. A throttle step
# below makes sure we only actually DEPLOY about once every 9 minutes, because
# GitHub Pages rate-limits deployments (~10/hour) — deploy more often than that
# and it silently stops publishing, leaving the live site hours stale.

on:
  workflow_dispatch: # external trigger + the manual "Run workflow" button
    inputs:
      force:
        description: "Force a deploy now (ignore the throttle)"
        type: boolean
        default: false
  schedule:
    - cron: "13,43 * * * *" # backup only: twice an hour
  push:
    branches: [main] # rebuild straight away whenever you push a change

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time, newest wins. With triggers every ~5 min, queuing runs
# (cancel-in-progress: false) made them supersede each other forever and nothing
# ever published — a deadlock. The throttle step below is what limits our deploy
# rate, so cancelling an older run here is safe: the next one just redoes it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # Throttle: skip everything if the site was published very recently, so we
      # stay comfortably under GitHub Pages' deploy rate limit. Uses the live
      # site's own Last-Modified as the clock, so it's stateless and correct even
      # though each run starts fresh.
      - name: Throttle deploys
        id: gate
        run: |
          # A push means the code/config changed — always deploy that straight away.
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then echo "go=true" >> "$GITHUB_OUTPUT"; echo "Push event — deploying immediately."; exit 0; fi
          # "Run workflow" with force ticked — deploy now, ignore the throttle.
          if [ "${{ inputs.force }}" = "true" ]; then echo "go=true" >> "$GITHUB_OUTPUT"; echo "Forced run — deploying immediately."; exit 0; fi
          LM=$(curl -sI "https://vintmatthew.github.io/family-world-cup/" | tr -d '\r' | grep -i '^last-modified:' | cut -d' ' -f2-)
          if [ -z "$LM" ]; then echo "go=true" >> "$GITHUB_OUTPUT"; echo "No Last-Modified header — proceeding."; exit 0; fi
          AGE=$(( $(date -u +%s) - $(date -u -d "$LM" +%s) ))
          echo "Live site was last published ${AGE}s ago."
          if [ "$AGE" -ge 540 ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "Old enough — will rebuild and deploy."
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "Deployed <9 min ago — skipping to respect GitHub Pages rate limits."
          fi

      - if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.go == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build the page
        if: steps.gate.outputs.go == 'true'
        run: node refresh.mjs
        # PDF generation is skipped on the runner (no browser) — handled gracefully.

      - name: Stage the page for publishing
        if: steps.gate.outputs.go == 'true'
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - if: steps.gate.outputs.go == 'true'
        uses: actions/configure-pages@v5
      - if: steps.gate.outputs.go == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        if: steps.gate.outputs.go == 'true'
        uses: actions/deploy-pages@v4
